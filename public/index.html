<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT-OSS-20B Чат</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .loader { text-align: center; }
    .spinner {
      border: 4px solid #2d2d3a;
      border-top: 4px solid #0d6efd;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"><div class="spinner"></div><p>Проверка авторизации...</p></div>
  <script>
    (async () => {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        window.location.href = data.authenticated ? '/chat.html' : '/auth.html';
      } catch { window.location.href = '/auth.html'; }
    })();
  </script>
</body>
</html>
