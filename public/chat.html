<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Чат | GPT-OSS-20B</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Чаты</h2>
        <button id="newChatBtn" class="icon-btn" title="Новый чат">+</button>
      </div>
      <ul id="chatList" class="chat-list"></ul>
      <div class="sidebar-footer">
        <!-- Блок аватара и имени пользователя -->
        <div class="avatar-container">
          <img id="userAvatar" class="user-avatar" src="/default-avatar.svg" alt="Аватар">
          <div class="user-info">
            <span>👤 <span id="sidebarUsername"></span></span>
          </div>
        </div>
        <a href="/settings.html" class="icon-btn" style="text-decoration: none; display: inline-block;">Настройки</a>
        <button id="logoutBtn" class="icon-btn">Выйти</button>
      </div>
    </aside>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <main class="main">
      <div class="chat-header">
        <button id="burgerMenu" class="burger-menu" aria-label="Меню">☰</button>
        <h3 id="currentChatTitle"></h3>
      </div>
      <div class="chat-container" id="chatContainer"></div>
      <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="Сообщение... (Enter отправить)"></textarea>
        <div class="input-actions">
          <select id="reasoningSelect">
            <option value="low">Усилие: низкое</option>
            <option value="medium" selected>Усилие: среднее</option>
            <option value="high">Усилие: высокое</option>
          </select>
          <div class="action-buttons">
            <button id="sendBtn" aria-label="Отправить">
              <svg>...</svg>
            </button>
            <button id="stopBtn" style="display: none;" aria-label="Стоп">
              <svg>...</svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Модальное окно смены пароля -->
  <div id="changePasswordModal" class="modal">
    <div class="modal-content">
      <h3>Смена пароля</h3>
      <div class="input-group password-group">
        <input type="password" id="oldPassword" placeholder="Старый пароль">
        <span class="toggle-password" data-target="oldPassword">👁️</span>
      </div>
      <div class="input-group password-group">
        <input type="password" id="newPassword" placeholder="Новый пароль (мин. 6 символов)">
        <span class="toggle-password" data-target="newPassword">👁️</span>
      </div>
      <div class="input-group password-group">
        <input type="password" id="confirmPassword" placeholder="Подтвердите пароль">
        <span class="toggle-password" data-target="confirmPassword">👁️</span>
      </div>
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
        <button id="cancelPasswordBtn" class="secondary">Отмена</button>
        <button id="savePasswordBtn">Сохранить</button>
      </div>
      <div id="passwordError" class="error-message"></div>
    </div>
  </div>

  <!-- Модальное окно смены никнейма -->
  <div id="changeUsernameModal" class="modal">
    <div class="modal-content">
      <h3>Сменить никнейм</h3>
      <input type="text" id="newUsername" placeholder="Новый никнейм (буквы, цифры, _)">
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
        <button id="cancelUsernameBtn" class="secondary">Отмена</button>
        <button id="saveUsernameBtn">Сохранить</button>
      </div>
      <div id="usernameError" class="error-message"></div>
    </div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h3 id="confirmTitle">Подтверждение</h3>
      <p id="confirmMessage">Вы уверены?</p>
      <div style="display: flex; gap: 1rem; justify-content: flex-end;">
        <button id="confirmYesBtn" class="secondary">Да</button>
        <button id="confirmNoBtn" class="secondary">Нет</button>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3>Редактировать сообщение</h3>
      <textarea id="editMessageText" rows="3" placeholder="Введите новый текст..."></textarea>
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 0.5rem;">
        <button id="editCancelBtn" class="secondary">Отмена</button>
        <button id="editSaveBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно для переименования чата -->
  <div id="renameModal" class="modal">
    <div class="modal-content">
      <h3>Переименовать чат</h3>
      <input type="text" id="renameChatInput" placeholder="Новое название" />
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 0.5rem;">
        <button id="renameCancelBtn" class="secondary">Отмена</button>
        <button id="renameSaveBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <h3 id="infoTitle">Информация</h3>
      <p id="infoMessage"></p>
      <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
        <button id="infoOkBtn">OK</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно удаления аккаунта -->
  <div id="deleteAccountModal" class="modal">
    <div class="modal-content">
      <h3>Удаление аккаунта</h3>
      <p>Введите пароль для подтверждения:</p>
      <input type="password" id="deleteAccountPassword" placeholder="Пароль">
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
        <button id="cancelDeleteAccountBtn" class="secondary">Отмена</button>
        <button id="confirmDeleteAccountBtn" class="danger-btn">Удалить навсегда</button>
      </div>
      <div id="deleteAccountError" class="error-message"></div>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
