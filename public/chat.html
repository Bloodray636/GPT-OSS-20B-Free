<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Чат | GPT-OSS-20B</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark">
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Чаты</h2>
        <button id="newChatBtn" class="icon-btn" title="Новый чат">+</button>
      </div>
      <ul id="chatList" class="chat-list"></ul>
      <div class="sidebar-footer">
        <div class="user-panel">
          <div class="user-avatar-small">
            <img id="userAvatar" src="/default-avatar.svg" alt="Avatar">
          </div>
          <span id="sidebarUsername"></span>
          <div class="user-menu-trigger" id="userMenuTrigger">
            ⋮
          </div>
          <div id="userDropdown" class="user-dropdown" style="display: none;">
            <a href="/settings.html">Настройки</a>
            <button id="logoutBtnFromMenu">Выйти</button>
          </div>
        </div>
      </div>
    </aside>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <main class="main">
      <div class="chat-header">
        <button id="burgerMenu" class="burger-menu" aria-label="Меню">☰</button>
        <h3 id="currentChatTitle"></h3>
      </div>
      <div class="chat-container" id="chatContainer"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea id="userInput" rows="1" placeholder="Введите сообщение"></textarea>
          <button id="sendBtn" aria-label="Отправить">
            <svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" viewBox="0 0 385.707 385.707" style="enable-background:new 0 0 385.707 385.707;" xml:space="preserve">
              <g>
                <g>
                  <g>
                    <path d="M382.83,17.991c-2.4-2-5.6-2.4-8.4-1.2l-365.2,160c-6,2.4-9.6,8.4-9.2,15.2c0.4,6.8,4.4,12.4,10.8,14.8l106.8,35.2v96 c0,8.8,5.6,16.4,14,18.8c8.4,2.8,17.6-0.4,22.8-7.6l44.8-64.8l94.8,81.6c2.8,2.4,6.4,3.6,10.4,3.6c2,0,3.6-0.4,5.2-0.8 c5.6-2,9.6-6.4,10.4-12l65.6-330.8C386.03,23.191,384.83,19.991,382.83,17.991z M191.23,267.591l-50,72.4c-1.6,2.4-3.6,2-4.8,1.6 c-0.8,0-2.8-1.2-2.8-3.6v-101.6c0-3.6-2-6.4-5.6-7.6l-112.4-37.6l324.8-142l-160,131.6c-3.6,2.8-4,8-1.2,11.2c1.6,2,4,2.8,6,2.8 c1.6,0,3.6-0.4,5.2-2l138.8-114L191.23,267.591z M304.43,353.591l-96-82.4l153.6-209.6L304.43,353.591z"/>
                    <path d="M158.83,198.391l-12.8,10.4c-3.6,2.8-4,8-1.2,11.2c1.6,2,4,2.8,6.4,2.8c1.6,0,3.6-0.4,5.2-1.6l12.8-10.4 c3.6-2.8,4-8,1.2-11.2C167.63,196.391,162.43,195.991,158.83,198.391z"/>
                  </g>
                </g>
              </g>
            </svg>
          </button>
          <button id="stopBtn" style="display: none;" aria-label="Стоп">
            <svg fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path clip-rule="evenodd" d="m6 9c0-1.65685 1.34315-3 3-3h6c1.6569 0 3 1.34315 3 3v6c0 1.6569-1.3431 3-3 3h-6c-1.65685 0-3-1.3431-3-3zm3-1c-.55228 0-1 .44772-1 1v6c0 .5523.44772 1 1 1h6c.5523 0 1-.4477 1-1v-6c0-.55228-.4477-1-1-1z" fill-rule="evenodd"/>
            </svg>
          </button>
        </div>
        <select id="reasoningSelect" class="reasoning-select-bottom">
          <option value="low">Усилие: низкое</option>
          <option value="medium" selected>Усилие: среднее</option>
          <option value="high">Усилие: высокое</option>
        </select>
      </div>
    </main>
  </div>

  <!-- Модальное окно смены пароля -->
  <div id="changePasswordModal" class="modal">
    <div class="modal-content">
      <h3>Смена пароля</h3>
      <div class="input-group password-group">
        <input type="password" id="oldPassword" placeholder="Старый пароль">
        <span class="toggle-password" data-target="oldPassword">👁️</span>
      </div>
      <div class="input-group password-group">
        <input type="password" id="newPassword" placeholder="Новый пароль (мин. 6 символов)">
        <span class="toggle-password" data-target="newPassword">👁️</span>
      </div>
      <div class="input-group password-group">
        <input type="password" id="confirmPassword" placeholder="Подтвердите пароль">
        <span class="toggle-password" data-target="confirmPassword">👁️</span>
      </div>
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
        <button id="cancelPasswordBtn" class="secondary">Отмена</button>
        <button id="savePasswordBtn">Сохранить</button>
      </div>
      <div id="passwordError" class="error-message"></div>
    </div>
  </div>

  <!-- Модальное окно смены никнейма -->
  <div id="changeUsernameModal" class="modal">
    <div class="modal-content">
      <h3>Сменить никнейм</h3>
      <input type="text" id="newUsername" placeholder="Новый никнейм (буквы, цифры, _)">
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
        <button id="cancelUsernameBtn" class="secondary">Отмена</button>
        <button id="saveUsernameBtn">Сохранить</button>
      </div>
      <div id="usernameError" class="error-message"></div>
    </div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h3 id="confirmTitle">Подтверждение</h3>
      <p id="confirmMessage">Вы уверены?</p>
      <div style="display: flex; gap: 1rem; justify-content: flex-end;">
        <button id="confirmYesBtn" class="secondary">Да</button>
        <button id="confirmNoBtn" class="secondary">Нет</button>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3>Редактировать сообщение</h3>
      <textarea id="editMessageText" rows="3" placeholder="Введите новый текст..."></textarea>
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 0.5rem;">
        <button id="editCancelBtn" class="secondary">Отмена</button>
        <button id="editSaveBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно для переименования чата -->
  <div id="renameModal" class="modal">
    <div class="modal-content">
      <h3>Переименовать чат</h3>
      <input type="text" id="renameChatInput" placeholder="Новое название" />
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 0.5rem;">
        <button id="renameCancelBtn" class="secondary">Отмена</button>
        <button id="renameSaveBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <h3 id="infoTitle">Информация</h3>
      <p id="infoMessage"></p>
      <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
        <button id="infoOkBtn">OK</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно удаления аккаунта -->
  <div id="deleteAccountModal" class="modal">
    <div class="modal-content">
      <h3>Удаление аккаунта</h3>
      <p>Введите пароль для подтверждения:</p>
      <input type="password" id="deleteAccountPassword" placeholder="Пароль">
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
        <button id="cancelDeleteAccountBtn" class="secondary">Отмена</button>
        <button id="confirmDeleteAccountBtn" class="danger-btn">Удалить навсегда</button>
      </div>
      <div id="deleteAccountError" class="error-message"></div>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
